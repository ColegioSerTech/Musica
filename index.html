<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de música — Que música é essa?</title>
<style>
  :root{
    --yellow:#F8B83D;
    --red:#DE3B53;
    --red-dark:#C32E45;
    --teal:#2E8B8B;
    --ink:#262626;
    --bg:#FFFFFF;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:#fff;
    overflow:hidden;
    width:100%;
    height:100%;
    font-family:'Segoe UI', Arial, sans-serif;
  }

  .deck{
    position:fixed;
    inset:0;
    overflow:hidden;
  }

  /* ---------- fixed 1920x1080 reference frame, scaled to always cover the
       viewport (no letterbox bars) while keeping every percentage-based
       hotspot perfectly aligned with the artwork ---------- */
  .slide-frame{
    position:absolute;
    top:50%;
    left:50%;
    width:1920px;
    height:1080px;
    background:#fff;
    overflow:hidden;
    transform-origin:center center;
    /* transform (translate + scale) is set by JS on load/resize */
  }

  .screen{
    position:absolute;
    inset:0;
    display:none;
  }
  .screen.active{
    display:block;
    animation:fadeIn .3s ease;
  }
  @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }

  .screen img.bg{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
    -webkit-user-select:none;
    user-select:none;
    pointer-events:none;
  }

  /* ---------- invisible hotspots placed over the artwork ---------- */
  .hotspot{
    position:absolute;
    -webkit-tap-highlight-color:transparent;
    appearance:none;
    border:none;
    background:transparent;
    padding:0;
    margin:0;
    cursor:pointer;
    z-index:20;
    transition:transform .18s ease, background-color .18s ease;
  }
  .hotspot.round{ border-radius:50%; }
  .hotspot:hover{ background-color:rgba(255,255,255,0.10); }
  .hotspot:active{ transform:scale(0.96); background-color:rgba(255,255,255,0.18); }
  .hotspot:focus-visible{
    outline:3px solid var(--teal);
    outline-offset:4px;
    border-radius:14px;
  }

  /* gentle idle breathing glow so primary CTA hotspots don't look static */
  .cta-pulse{
    animation:ctaBreath 2.4s ease-in-out infinite;
  }
  @keyframes ctaBreath{
    0%, 100%{ box-shadow:0 0 0 0 rgba(255,255,255,0); }
    50%{ box-shadow:0 0 0 10px rgba(255,255,255,0.16); }
  }

  /* full-screen "continue" hotspot (instructions) gets a softer hover, no scale */
  .hotspot.fullscreen:hover{ background-color:rgba(0,0,0,0.04); }
  .hotspot.fullscreen:active{ transform:none; background-color:rgba(0,0,0,0.08); }

  /* ---------- audio button feedback (question screens) ---------- */
  .audio-btn{ border-radius:50%; transition:transform .2s ease; }
  .audio-btn:hover{ transform:scale(1.04); }
  .audio-btn:active{ transform:scale(0.97); }

  .audio-btn .ring{
    position:absolute;
    inset:-10%;
    border-radius:50%;
    pointer-events:none;
    opacity:0;
  }
  .audio-btn.playing{ transform:scale(1.05); }
  .audio-btn.playing .ring{
    opacity:1;
    animation:glowPulse 1.1s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%, 100%{ box-shadow:0 0 0 0 rgba(222,59,83,0.55); }
    50%{ box-shadow:0 0 0 22px rgba(222,59,83,0); }
  }

  .status-tag{
    position:absolute;
    left:50%;
    bottom:9%;
    transform:translateX(-50%);
    font-size:15px;
    font-weight:600;
    color:#8a8a8a;
    white-space:nowrap;
    pointer-events:none;
  }

  /* ---------- next arrow (appears once audio starts) ---------- */
  .next-arrow{
    position:absolute;
    bottom:6%;
    right:5%;
    width:11%;
    aspect-ratio:1/1;
    border-radius:50%;
    border:none;
    background:var(--red);
    color:#fff;
    font-size:30px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 14px 28px -10px rgba(195,46,69,0.6);
    opacity:0;
    transform:translateX(14px) scale(0.85);
    pointer-events:none;
    transition:opacity .35s ease, transform .2s ease, background-color .18s ease;
    z-index:25;
  }
  .next-arrow.show{
    opacity:1;
    transform:translateX(0) scale(1);
    pointer-events:auto;
    animation:archPulse 1.6s ease-in-out infinite;
  }
  @keyframes archPulse{
    0%, 100%{ box-shadow:0 14px 28px -10px rgba(195,46,69,0.6); }
    50%{ box-shadow:0 14px 28px -4px rgba(195,46,69,0.9); }
  }
  .next-arrow.show:hover{ transform:scale(1.1); background:var(--red-dark); }
  .next-arrow.show:active{ transform:scale(0.94); }

  /* ---------- answer screens: continue arrow ---------- */
  .answer-next{
    position:absolute;
    bottom:5%;
    right:4.5%;
    width:9%;
    aspect-ratio:1/1;
    border-radius:50%;
    border:none;
    background:rgba(38,38,38,0.82);
    color:#fff;
    font-size:26px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 12px 24px -8px rgba(0,0,0,0.5);
    transition:transform .18s ease, background .18s ease;
  }
  .answer-next:hover{ transform:scale(1.08); background:var(--red); }
  .answer-next:active{ transform:scale(0.95); }

  /* ---------- progress badge ---------- */
  .progress{
    position:fixed;
    top:16px;
    left:50%;
    transform:translateX(-50%);
    font-size:0.78rem;
    color:#444;
    background:rgba(255,255,255,0.9);
    padding:5px 14px;
    border-radius:20px;
    z-index:50;
    letter-spacing:0.5px;
    pointer-events:none;
  }

  /* ---------- final screen restart button ---------- */
  .restart-btn{
    transition:transform .18s ease, box-shadow .18s ease;
    box-shadow:0 10px 24px -10px rgba(0,0,0,0.4);
  }
  .restart-btn:hover{ transform:scale(1.06); box-shadow:0 14px 30px -10px rgba(0,0,0,0.5); }
  .restart-btn:active{ transform:scale(0.96); }

</style>
</head>
<body>

<div class="progress" id="progress"></div>

<div class="deck">
  <div class="slide-frame" id="slideFrame">

    <!-- ===================== COVER ===================== -->
    <div class="screen active" data-screen="cover">
      <img class="bg" src="1-capa.png" alt="Quiz de música">
      <button class="hotspot round cta-pulse" data-action="goto" data-target="instructions"
        style="left:44.5%; top:81.8%; width:9%; height:16%;"
        aria-label="Começar"></button>
    </div>

    <!-- ===================== INSTRUCTIONS ===================== -->
    <div class="screen" data-screen="instructions">
      <img class="bg" src="2-instrucoes.png" alt="Instruções">
      <button class="hotspot fullscreen" data-action="goto" data-target="start"
        style="left:0; top:0; width:100%; height:100%;"
        aria-label="Continuar"></button>
    </div>

    <!-- ===================== START ===================== -->
    <div class="screen" data-screen="start">
      <img class="bg" src="3-start.png" alt="Prontos para começar?">
      <button class="hotspot cta-pulse" data-action="goto" data-target="q-bieber"
        style="left:39.8%; top:74.6%; width:20.8%; height:14.4%; border-radius:40px;"
        aria-label="Start"></button>
    </div>

    <!-- ===================== ROUNDS (injected by JS) ===================== -->
    <div id="rounds-container"></div>

    <!-- ===================== FINAL ===================== -->
    <div class="screen" data-screen="final" style="background:var(--red);">
      <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
        <div style="text-align:center; color:#fff; padding:5%;">
          <h1 style="font-size:52px; margin:0 0 14px;">Parabéns! 🎉</h1>
          <p style="font-size:1rem; margin:0 0 28px; opacity:0.9;">Vocês chegaram ao fim do quiz.</p>
          <button class="restart-btn" data-action="goto" data-target="cover"
            style="border:none; background:#fff; color:var(--red); font-weight:700; font-size:1rem; padding:14px 36px; border-radius:40px; cursor:pointer;">
            Jogar novamente
          </button>
        </div>
      </div>
    </div>

  </div>
</div>

<audio id="player" preload="none"></audio>

<script>
  // -------------------------------------------------------------
  // Round data: each round has a question screen (audio button,
  // same pill banner style as before) and an answer screen
  // (full high-res background image revealing the artist).
  // -------------------------------------------------------------
  const ROUNDS = [
    { key:'bieber',    audioVar:'baby-justin-bieber.mp3',    imgVar:'5-resposta-bieber.png'    },
    { key:'chicago',   audioVar:'chicago-michael-jackson.mp3',   imgVar:'7-resposta-chicago.png'   },
    { key:'pais',      audioVar:'pais-do-futebol-mg-guime.mp3',      imgVar:'9-resposta-pais.png'      },
    { key:'allstar',   audioVar:'all-star-smash-mouth.mp3',   imgVar:'11-resposta-allstar.png'   },
    { key:'thunder',   audioVar:'thunder-imagine-dragons.mp3',   imgVar:'13-resposta-thunder.png'   },
    { key:'vagalumes', audioVar:'vagalumes-pollo.mp3', imgVar:'15-resposta-vagalumes.png' },
  ];

  const container = document.getElementById('rounds-container');

  function buildWaveformBars(){
    const heights = [14,26,40,18,52,30,60,38,70,48,64,34,58,24,46,16,30,12,20,10];
    return heights.map(h => {
      const dur = (0.5 + Math.random() * 0.5).toFixed(2);
      const delay = (Math.random() * 0.3).toFixed(2);
      return `<span style="width:3px; height:${h}%; max-height:${h}px; background:var(--ink); border-radius:2px; display:inline-block; margin:0 1.5px; transform-origin:center; animation-duration:${dur}s; animation-delay:${delay}s;" class="bar"></span>`;
    }).join('');
  }

  ROUNDS.forEach((round, idx) => {
    const nextTarget = `a-${round.key}`;
    const qScreen = document.createElement('div');
    qScreen.className = 'screen';
    qScreen.dataset.screen = `q-${round.key}`;
    qScreen.style.cssText = 'background:#fff;';
    qScreen.innerHTML = `
      <svg style="position:absolute; width:18%; top:-6%; right:-6%; transform:rotate(8deg); z-index:0;" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <path fill="#DE3B53" d="M70,10 C140,-20 200,40 240,10 C280,-20 330,30 320,90 C310,150 250,140 220,180 C190,220 230,280 180,300 C130,320 90,260 60,230 C30,200 -10,180 10,130 C30,80 0,40 70,10 Z"/>
        <path fill="#F8B83D" d="M150,10 C190,-10 230,20 220,60 C210,100 160,90 140,60 C120,30 110,30 150,10 Z"/>
      </svg>
      <svg style="position:absolute; width:18%; bottom:-6%; left:-6%; transform:rotate(188deg); z-index:0;" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <path fill="#DE3B53" d="M70,10 C140,-20 200,40 240,10 C280,-20 330,30 320,90 C310,150 250,140 220,180 C190,220 230,280 180,300 C130,320 90,260 60,230 C30,200 -10,180 10,130 C30,80 0,40 70,10 Z"/>
        <path fill="#F8B83D" d="M150,10 C190,-10 230,20 220,60 C210,100 160,90 140,60 C120,30 110,30 150,10 Z"/>
      </svg>

      <div style="position:relative; z-index:1; width:100%; height:100%; display:flex; align-items:center;">
        <div style="position:relative; width:62%; max-width:62%; margin-left:6%;">
          <div style="background:var(--yellow); border-radius:90px 90px 36px 76px / 80px 80px 46px 80px; padding:6% 9% 6% 7%; box-shadow:0 18px 40px -20px rgba(0,0,0,0.25);">
            <h1 style="margin:0; color:var(--red); font-size:58px; line-height:1.08; font-weight:700; letter-spacing:-0.5px;">Que música<br>é essa?</h1>
          </div>
          <div style="position:absolute; height:5px; border-radius:6px; background:var(--teal); width:62%; left:2%; bottom:-4%;"></div>
          <div style="position:absolute; height:5px; border-radius:6px; background:var(--teal); width:16%; left:5%; bottom:-7%;"></div>
        </div>

        <div style="position:relative; margin-left:4%;">
          <button class="hotspot round audio-btn" data-round="${round.key}" aria-label="Tocar áudio" aria-pressed="false"
            style="position:relative; width:190px; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;">
            <span class="ring"></span>
            <span style="position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 35% 30%, var(--red) 0%, var(--red-dark) 100%); box-shadow:0 12px 30px -10px rgba(195,46,69,0.55);"></span>
            <span style="position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:2px; height:55%; pointer-events:none;">${buildWaveformBars()}</span>
          </button>
          <p class="status-tag" data-status="${round.key}" style="position:absolute; left:50%; top:108%; transform:translateX(-50%); width:max-content;">Clique para ouvir</p>
        </div>
      </div>

      <button class="next-arrow" data-next-from="${round.key}" data-target="${nextTarget}" aria-label="Ver resposta">→</button>
    `;
    container.appendChild(qScreen);

    const aScreen = document.createElement('div');
    aScreen.className = 'screen';
    aScreen.dataset.screen = `a-${round.key}`;
    const isLast = idx === ROUNDS.length - 1;
    const nextScreenTarget = isLast ? 'final' : `q-${ROUNDS[idx + 1].key}`;
    aScreen.innerHTML = `
      <img class="bg" src="${round.imgVar}" alt="Resposta">
      <button class="hotspot answer-next" data-action="goto" data-target="${nextScreenTarget}" aria-label="Continuar">→</button>
    `;
    container.appendChild(aScreen);
  });

  // -------------------------------------------------------------
  // Audio sources (data URIs injected at build time)
  // -------------------------------------------------------------
  const AUDIO_SRC = {
    bieber:    'baby-justin-bieber.mp3',
    chicago:   'chicago-michael-jackson.mp3',
    pais:      'pais-do-futebol-mg-guime.mp3',
    allstar:   'all-star-smash-mouth.mp3',
    thunder:   'thunder-imagine-dragons.mp3',
    vagalumes: 'vagalumes-pollo.mp3',
  };

  // -------------------------------------------------------------
  // Navigation
  // -------------------------------------------------------------
  const screens = Array.from(document.querySelectorAll('.screen'));
  const player = document.getElementById('player');
  const progress = document.getElementById('progress');
  let activeBtn = null;

  function stopAudio(){
    player.pause();
    if (activeBtn){
      activeBtn.classList.remove('playing');
      activeBtn.setAttribute('aria-pressed', 'false');
      const status = document.querySelector(`[data-status="${activeBtn.dataset.round}"]`);
      if (status) status.textContent = 'Clique para ouvir';
      activeBtn = null;
    }
  }

  function showScreen(name){
    stopAudio();
    screens.forEach(s => s.classList.remove('active'));
    const target = document.querySelector(`[data-screen="${name}"]`);
    if (target) target.classList.add('active');

    const roundIdx = ROUNDS.findIndex(r => name === `q-${r.key}` || name === `a-${r.key}`);
    progress.textContent = roundIdx >= 0 ? `Pergunta ${roundIdx + 1} / ${ROUNDS.length}` : '';
  }

  document.addEventListener('click', (e) => {
    const goto = e.target.closest('[data-action="goto"]');
    if (goto){
      showScreen(goto.dataset.target);
      return;
    }

    const audioBtn = e.target.closest('.audio-btn');
    if (audioBtn){
      const round = audioBtn.dataset.round;
      const status = document.querySelector(`[data-status="${round}"]`);
      const arrow = document.querySelector(`[data-next-from="${round}"]`);

      if (player.paused || activeBtn !== audioBtn){
        if (activeBtn && activeBtn !== audioBtn){
          activeBtn.classList.remove('playing');
          activeBtn.setAttribute('aria-pressed', 'false');
        }
        if (!player.src || activeBtn !== audioBtn){
          player.src = AUDIO_SRC[round];
        }
        player.play();
        activeBtn = audioBtn;
        audioBtn.classList.add('playing');
        audioBtn.setAttribute('aria-pressed', 'true');
        if (status) status.textContent = 'Tocando... toque p/ pausar';
        if (arrow) arrow.classList.add('show');
      } else {
        player.pause();
        audioBtn.classList.remove('playing');
        audioBtn.setAttribute('aria-pressed', 'false');
        if (status) status.textContent = 'Clique para ouvir';
      }
      return;
    }

    const nextArrow = e.target.closest('.next-arrow');
    if (nextArrow){
      showScreen(nextArrow.dataset.target);
    }
  });

  player.addEventListener('ended', () => {
    if (activeBtn){
      activeBtn.classList.remove('playing');
      activeBtn.setAttribute('aria-pressed', 'false');
      const round = activeBtn.dataset.round;
      const status = document.querySelector(`[data-status="${round}"]`);
      if (status) status.textContent = 'Clique para ouvir';
      activeBtn = null;
    }
  });

  // -------------------------------------------------------------
  // Keep the fixed 1920x1080 frame always covering the viewport
  // (no letterbox bars), while every hotspot's percentage position
  // stays perfectly aligned with the artwork.
  // -------------------------------------------------------------
  const frame = document.getElementById('slideFrame');
  function fitFrame(){
    const scale = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
    frame.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }
  fitFrame();
  window.addEventListener('resize', fitFrame);
  window.addEventListener('orientationchange', fitFrame);

  showScreen('cover');
</script>

<style>
  @keyframes pulseBar{ from{ transform:scaleY(0.4); } to{ transform:scaleY(1.15); } }
  .audio-btn.playing .bar{
    animation-name:pulseBar;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
    animation-direction:alternate;
  }
</style>

</body>
</html>
